name: Feature request
description: Propose a focused improvement to the Dense 1.3B FP8 integration.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and compatibility risks
      description: Include quality, VRAM, dependency, workflow, and model-license implications.
    validations:
      required: true
