name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata-and-static:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install metadata validators
        run: python -m pip install --disable-pip-version-check cffconvert==2.0.0
      - name: Validate citation metadata
        run: cffconvert --validate
      - name: Validate Python, TOML, JSON, and standalone workflow tests
        shell: bash
        run: |
          python -m compileall -q __init__.py nodes.py lingbot_video tools tests
          python - <<'PY'
          import json
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          for path in root.rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
          PY
          python -m unittest discover -s tests -p 'test_public_workflows.py' -v

  comfy-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out validated ComfyUI revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Comfy-Org/ComfyUI
          ref: b910f4fa2ae3c816ca29bb99f8ebc5baee3387ae
          path: ComfyUI
      - name: Check out custom node in ComfyUI layout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ComfyUI/custom_nodes/ComfyUI-LingBotVideo
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ComfyUI/requirements.txt
            ComfyUI/custom_nodes/ComfyUI-LingBotVideo/requirements.txt
      - name: Install CPU test dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          # Install the three ABI-coupled PyTorch packages from the same CPU
          # index before ComfyUI requirements are resolved. Otherwise PyPI can
          # supply a mismatched torchaudio wheel that fails at import time.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio
          python -m pip install -r ComfyUI/requirements.txt
          python -m pip install -r ComfyUI/custom_nodes/ComfyUI-LingBotVideo/requirements.txt
      - name: Run custom-node tests in ComfyUI layout
        working-directory: ComfyUI/custom_nodes/ComfyUI-LingBotVideo
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import unittest

          # Direct ComfyUI imports disable argument parsing by default. Enable
          # the normal parser before test discovery, then select CPU explicitly
          # because GitHub's runner intentionally installs CPU-only PyTorch.
          comfy_root = pathlib.Path(
              os.environ.get("COMFYUI_ROOT", pathlib.Path.cwd().parents[1])
          )
          sys.path.insert(0, str(comfy_root))
          sys.argv = [sys.argv[0], "--cpu"]
          import comfy.options

          comfy.options.enable_args_parsing()
          suite = unittest.defaultTestLoader.discover("tests")
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(not result.wasSuccessful())
          PY
